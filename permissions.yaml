# permissions.yaml
# Configure which embedded tool commands are allowed
#
# Format:
#   allow:
#     - Bash(ls)      # Allow ls command
#     - Bash(cat)     # Allow cat command
#   forbid:
#     - Bash(rm)      # Forbid rm command (takes precedence over allow)
#
# By default, no commands are allowed

allow:
  - Bash(ls)
  - Bash(pwd)
  - Bash(cat)
  - Bash(head)
  - Bash(tail)
  - Bash(find)
  - Bash(grep)
  - Bash(mkdir)
  - Bash(touch)
  - Bash(cp)
  - Bash(mv)
  - Bash(echo)
  - Bash(tree)
  - Bash(which)
  - Bash(whoami)
forbid:
  - Bash(rm)